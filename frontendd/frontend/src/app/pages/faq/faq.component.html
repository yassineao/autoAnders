<section class="bg-black px-4 py-16 text-white">
  <div class="mx-auto max-w-5xl">
    <div class="mx-auto max-w-3xl text-center">
      <h2 class="text-3xl font-semibold sm:text-4xl">{{ content().title }}</h2>
      <p class="mt-4 leading-7 text-zinc-300">{{ content().description }}</p>
    </div>
    <div class="mt-10 space-y-4">
      @for (item of displayedItems(); track item.question) {
        <details class="group rounded-2xl border border-white/10 bg-white/5 p-5">
          <summary class="flex cursor-pointer list-none items-center justify-between gap-4 text-lg font-medium">
            {{ item.question }}
            <span class="flex h-9 w-9 items-center justify-center rounded-full border border-white/10 text-red-400 transition group-open:rotate-45">+</span>
          </summary>
          <p class="mt-4 max-w-3xl leading-7 text-zinc-400">{{ item.answer }}</p>
        </details>
      }
    </div>
    @if (ctaHref()) {
      <div class="mt-10 text-center">
        <a [routerLink]="ctaHref()" class="inline-flex rounded-xl border border-red-500 px-5 py-3 font-semibold text-red-400 hover:bg-red-600 hover:text-white">{{ content().ctaLabel }}</a>
      </div>
    }
  </div>
</section>
