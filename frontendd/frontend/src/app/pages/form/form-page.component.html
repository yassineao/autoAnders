<main class="min-h-screen bg-black px-4 pb-16 pt-28 text-white">
  <div class="mx-auto grid max-w-7xl gap-8 lg:grid-cols-[1fr_28rem]">
    <section class="rounded-xl border border-white/10 bg-zinc-900 p-6 lg:p-8">
      <p class="font-semibold text-red-500">AutoAnders</p>
      <h1 class="mt-2 text-3xl font-black sm:text-4xl">{{ content().title }}</h1>
      <p class="mt-4 leading-7 text-zinc-400">{{ content().description }}</p>
      <form #form="ngForm" (ngSubmit)="submit(form)" class="mt-8 space-y-5">
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="text-sm text-zinc-300">
            {{ content().fields.companyName }}
            <input name="companyName" ngModel required [placeholder]="content().placeholders.companyName" class="mt-2 w-full rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-white" />
          </label>
          <label class="text-sm text-zinc-300">
            {{ content().fields.lastName }}
            <input name="lastName" ngModel required [placeholder]="content().placeholders.lastName" class="mt-2 w-full rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-white" />
          </label>
          <label class="text-sm text-zinc-300">
            {{ content().fields.email }}
            <input name="email" ngModel required type="email" [placeholder]="content().placeholders.email" class="mt-2 w-full rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-white" />
          </label>
          <label class="text-sm text-zinc-300">
            {{ content().fields.phoneNumber }}
            <input name="phoneNumber" ngModel type="tel" [placeholder]="content().placeholders.phoneNumber" class="mt-2 w-full rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-white" />
          </label>
        </div>
        <label class="block text-sm text-zinc-300">
          {{ content().fields.message }}
          <textarea name="message" ngModel required rows="6" [placeholder]="content().placeholders.message" class="mt-2 w-full rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-white"></textarea>
        </label>
        <label class="flex gap-3 rounded-lg border border-white/10 bg-zinc-950 p-4 text-sm leading-6 text-zinc-300">
          <input type="checkbox" name="consent" ngModel required class="mt-1" />
          <span>
            {{ content().consent.prefix }}
            <a [routerLink]="['/', locale(), 'terms']" class="underline">{{ content().consent.terms }}</a>
            {{ content().consent.and }}
            <a [routerLink]="['/', locale(), 'privacy']" class="underline">{{ content().consent.privacyPolicy }}</a>{{ content().consent.suffix }}
          </span>
        </label>
        <button [disabled]="form.invalid || sending()" class="w-full rounded-lg bg-red-600 px-5 py-3.5 font-bold disabled:opacity-50">{{ sending() ? "Sending..." : content().submitLabel }}</button>
      </form>
    </section>
    <aside class="relative hidden overflow-hidden rounded-xl lg:block">
      <img src="/hero.jpg" [alt]="content().testimonial.imageAlt" class="absolute inset-0 h-full w-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
      <div class="relative flex h-full flex-col justify-end p-8">
        <p class="text-lg font-semibold leading-7">{{ content().testimonial.quote }}</p>
        <p class="mt-4 text-zinc-300">{{ content().testimonial.author }}</p>
      </div>
    </aside>
  </div>
  @if (sent()) {
    <div class="fixed inset-0 z-[80] flex items-center justify-center bg-black/70 p-4">
      <div class="max-w-sm rounded-xl bg-zinc-900 p-6 text-center">
        <h2 class="text-xl font-bold text-emerald-300">{{ content().popup.successTitle }}</h2>
        <p class="mt-3 text-zinc-300">{{ content().popup.successMessage }}</p>
        <button type="button" (click)="sent.set(false)" class="mt-6 w-full rounded-lg bg-red-600 py-3 font-bold">{{ content().popup.closeLabel }}</button>
      </div>
    </div>
  }
</main>
